<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kharcha Tracker</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #4e54c8, #8f94fb);
      margin: 0;
      padding: 0;
      color: #fff;
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0px); }
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 40px 20px;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin: 0;
    }

    .tagline {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.9;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      animation: cardLoad 0.6s ease;
    }

    @keyframes cardLoad {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* INPUT ROW */
    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #ffdd57;
      color: #333;
      font-weight: 600;
      cursor: pointer;
      font-size: 17px;
      transition: 0.3s;
    }

    button:hover {
      background: #ffe581;
      transform: translateY(-2px);
    }

    /* EXPENSE ITEM */
    .expense-item {
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.2);
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
    }

    .delete-btn {
      background: #ff4b5c;
      padding: 6px 10px;
      border-radius: 6px;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* TOTAL BOX */
    .total-box {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      padding: 20px;
      background: #ffdd57;
      color: #333;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    /* UPI BUTTON */
    .upi-btn {
      background: #00e676;
      color: #fff;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    .upi-btn:hover {
      background: #1bff8a;
      transform: scale(1.03);
    }

  </style>
</head>

<body>

  <div class="header">
    <h1>Kharcha Tracker</h1>
    <p class="tagline">Tracking your daily expense so that it doesn’t hurt on the month end</p>
  </div>

  <div class="container">

    <!-- INPUT CARD -->
    <div class="card">
      <h2>Add New Expense</h2>
      <div class="form-row">
        <input type="text" id="expenseName" placeholder="Expense Name">
        <input type="number" id="expenseAmount" placeholder="Amount (₹)">
        
        <select id="expenseCategory">
          <option value="">Select Category</option>
          <option>Food</option>
          <option>Travel</option>
          <option>Rent</option>
          <option>Shopping</option>
          <option>Health</option>
          <option>College</option>
          <option>Entertainment</option>
          <option>Other</option>
        </select>

        <button onclick="addExpense()">Add Expense</button>
      </div>
    </div>

    <!-- TOTAL -->
    <div class="card total-box">
      Total Spent: ₹<span id="totalAmount">0</span>
    </div>

    <!-- UPI BUTTON -->
    <button class="upi-btn">Pay via UPI (Coming Soon 😎)</button>

    <!-- PIE CHART -->
    <div class="card">
      <h2>Expense Breakdown</h2>
      <canvas id="pieChart"></canvas>
    </div>

    <!-- EXPENSE LIST -->
    <div class="card">
      <h2>All Expenses</h2>
      <div id="expenseList"></div>
    </div>

  </div>
